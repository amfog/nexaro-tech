<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160">
  <defs>
    <linearGradient id="pp-border" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="pp-glow-bg" cx="50%" cy="52%" r="38%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="pp-glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Gradient border -->
  <rect width="240" height="160" rx="12" fill="url(#pp-border)"/>
  <!-- Dark inner bg -->
  <rect x="2" y="2" width="236" height="156" rx="10" fill="#0A0E27"/>
  <!-- Radial glow -->
  <ellipse cx="120" cy="78" rx="54" ry="38" fill="url(#pp-glow-bg)"/>

  <!-- Product code -->
  <text x="120" y="22" text-anchor="middle" fill="#6B7280" font-size="9" font-family="monospace" letter-spacing="1.5">PORTFOLIO</text>
  <!-- Name -->
  <text x="120" y="42" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="system-ui, sans-serif">Abdelrahman</text>

  <!-- Avatar / person icon -->
  <!-- Outer glow ring -->
  <circle cx="120" cy="72" r="22" fill="rgba(59,130,246,0.1)" stroke="url(#pp-border)" stroke-width="1" opacity="0.5"/>
  <!-- Head -->
  <circle cx="120" cy="64" r="11" fill="url(#pp-border)" opacity="0.75" filter="url(#pp-glow)"/>
  <!-- Body / shoulders -->
  <path d="M98 98 Q98 80 120 80 Q142 80 142 98 Z" fill="url(#pp-border)" opacity="0.65"/>

  <!-- AM initials badge -->
  <rect x="103" y="100" width="34" height="13" rx="3" fill="url(#pp-border)" filter="url(#pp-glow)"/>
  <text x="120" y="110" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="monospace" letter-spacing="2">AM</text>

  <!-- Subtitle -->
  <text x="120" y="148" text-anchor="middle" fill="#3B82F6" font-size="9" font-family="monospace" letter-spacing="0.5">Operations Leader</text>
</svg>
