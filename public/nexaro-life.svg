<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160">
  <defs>
    <linearGradient id="nl-border" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="nl-glow-bg" cx="50%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="nl-glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Gradient border -->
  <rect width="240" height="160" rx="12" fill="url(#nl-border)"/>
  <!-- Dark inner bg -->
  <rect x="2" y="2" width="236" height="156" rx="10" fill="#0A0E27"/>
  <!-- Radial glow -->
  <ellipse cx="120" cy="80" rx="55" ry="40" fill="url(#nl-glow-bg)"/>

  <!-- Product code -->
  <text x="120" y="22" text-anchor="middle" fill="#6B7280" font-size="9" font-family="monospace" letter-spacing="1.5">NX-001.L</text>
  <!-- Product name -->
  <text x="120" y="42" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="system-ui, sans-serif">Nexaro Life</text>

  <!-- AI chip body -->
  <rect x="104" y="56" width="32" height="32" rx="4" stroke="url(#nl-border)" stroke-width="1.5" fill="rgba(6,182,212,0.08)"/>
  <!-- Chip grid lines vertical -->
  <line x1="112" y1="56" x2="112" y2="88" stroke="#06B6D4" stroke-width="0.7" opacity="0.4"/>
  <line x1="120" y1="56" x2="120" y2="88" stroke="#06B6D4" stroke-width="0.7" opacity="0.4"/>
  <line x1="128" y1="56" x2="128" y2="88" stroke="#06B6D4" stroke-width="0.7" opacity="0.4"/>
  <!-- Chip grid lines horizontal -->
  <line x1="104" y1="65" x2="136" y2="65" stroke="#06B6D4" stroke-width="0.7" opacity="0.4"/>
  <line x1="104" y1="72" x2="136" y2="72" stroke="#06B6D4" stroke-width="0.7" opacity="0.4"/>
  <line x1="104" y1="79" x2="136" y2="79" stroke="#06B6D4" stroke-width="0.7" opacity="0.4"/>
  <!-- Left pins -->
  <line x1="94" y1="62" x2="104" y2="62" stroke="#06B6D4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="94" y1="70" x2="104" y2="70" stroke="#06B6D4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="94" y1="78" x2="104" y2="78" stroke="#06B6D4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="94" y1="86" x2="104" y2="86" stroke="#06B6D4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right pins -->
  <line x1="136" y1="62" x2="146" y2="62" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="136" y1="70" x2="146" y2="70" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="136" y1="78" x2="146" y2="78" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="136" y1="86" x2="146" y2="86" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center glow dot -->
  <circle cx="120" cy="72" r="4" fill="#06B6D4" opacity="0.9" filter="url(#nl-glow)"/>

  <!-- Connection to subtitle area -->
  <line x1="120" y1="88" x2="120" y2="98" stroke="#06B6D4" stroke-width="1" opacity="0.3" stroke-dasharray="2 3"/>

  <!-- Subtitle -->
  <text x="120" y="148" text-anchor="middle" fill="#06B6D4" font-size="9" font-family="monospace" letter-spacing="0.5">Personal AI OS</text>
</svg>
