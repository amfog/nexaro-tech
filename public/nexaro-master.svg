<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160">
  <defs>
    <linearGradient id="nm-border" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="nm-title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="nm-glow-bg" cx="50%" cy="58%" r="38%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="nm-glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nm-glow-strong">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Gradient border -->
  <rect width="240" height="160" rx="12" fill="url(#nm-border)"/>
  <!-- Dark inner bg -->
  <rect x="2" y="2" width="236" height="156" rx="10" fill="#0A0E27"/>
  <!-- Radial glow -->
  <ellipse cx="120" cy="92" rx="70" ry="50" fill="url(#nm-glow-bg)"/>

  <!-- Product code -->
  <text x="120" y="22" text-anchor="middle" fill="#6B7280" font-size="9" font-family="monospace" letter-spacing="1.5">NX-000.M</text>

  <!-- Product name with gradient fill via rect+clip trick -->
  <text x="120" y="44" text-anchor="middle" fill="url(#nm-title)" font-size="18" font-weight="bold" font-family="system-ui, sans-serif" letter-spacing="5">NEXARO</text>

  <!-- Dashed orbit ring -->
  <circle cx="120" cy="92" r="38" stroke="url(#nm-border)" stroke-width="1" stroke-dasharray="3 6" fill="none" opacity="0.5"/>

  <!-- N letterform / node network -->
  <!-- Left vertical line -->
  <line x1="100" y1="70" x2="100" y2="114" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Right vertical line -->
  <line x1="140" y1="70" x2="140" y2="114" stroke="#A855F7" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Diagonal line (N crossbar) -->
  <line x1="100" y1="70" x2="140" y2="114" stroke="url(#nm-border)" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Spoke lines to center -->
  <line x1="100" y1="70" x2="120" y2="92" stroke="#22D3EE" stroke-width="0.8" opacity="0.3"/>
  <line x1="100" y1="114" x2="120" y2="92" stroke="#22D3EE" stroke-width="0.8" opacity="0.3"/>
  <line x1="140" y1="70" x2="120" y2="92" stroke="#A855F7" stroke-width="0.8" opacity="0.3"/>
  <line x1="140" y1="114" x2="120" y2="92" stroke="#A855F7" stroke-width="0.8" opacity="0.3"/>

  <!-- Corner nodes -->
  <circle cx="100" cy="70" r="3.5" fill="#22D3EE" filter="url(#nm-glow)"/>
  <circle cx="100" cy="114" r="3.5" fill="#22D3EE" filter="url(#nm-glow)"/>
  <circle cx="140" cy="70" r="3.5" fill="#A855F7" filter="url(#nm-glow)"/>
  <circle cx="140" cy="114" r="3.5" fill="#A855F7" filter="url(#nm-glow)"/>

  <!-- Center hub node -->
  <circle cx="120" cy="92" r="6" fill="url(#nm-border)" filter="url(#nm-glow-strong)"/>
  <circle cx="120" cy="92" r="3" fill="white" opacity="0.9"/>

  <!-- Subtitle -->
  <text x="120" y="148" text-anchor="middle" fill="url(#nm-title)" font-size="9" font-family="monospace" letter-spacing="3">Platform</text>
</svg>
