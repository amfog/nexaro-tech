<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160">
  <defs>
    <linearGradient id="to-border" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="100%" stop-color="#71717A"/>
    </linearGradient>
    <radialGradient id="to-glow-bg" cx="50%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#64748B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#64748B" stop-opacity="0"/>
    </radialGradient>
    <filter id="to-glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Gradient border -->
  <rect width="240" height="160" rx="12" fill="url(#to-border)"/>
  <!-- Dark inner bg -->
  <rect x="2" y="2" width="236" height="156" rx="10" fill="#0A0E27"/>
  <!-- Radial glow -->
  <ellipse cx="120" cy="80" rx="52" ry="38" fill="url(#to-glow-bg)"/>

  <!-- Product code -->
  <text x="120" y="22" text-anchor="middle" fill="#6B7280" font-size="9" font-family="monospace" letter-spacing="1.5">NX-002.T</text>
  <!-- Product name -->
  <text x="120" y="42" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="system-ui, sans-serif">Teams OS</text>

  <!-- Shield outline -->
  <path d="M120 54 L143 62 L143 82 Q143 97 120 104 Q97 97 97 82 L97 62 Z"
    fill="rgba(100,116,139,0.12)" stroke="url(#to-border)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Hub-and-spoke nodes inside shield -->
  <!-- Spoke lines -->
  <line x1="120" y1="72" x2="110" y2="88" stroke="url(#to-border)" stroke-width="1.2" opacity="0.7"/>
  <line x1="120" y1="72" x2="130" y2="88" stroke="url(#to-border)" stroke-width="1.2" opacity="0.7"/>
  <line x1="120" y1="72" x2="120" y2="95" stroke="url(#to-border)" stroke-width="1.2" opacity="0.7"/>

  <!-- Leaf nodes -->
  <circle cx="110" cy="88" r="3" fill="none" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="130" cy="88" r="3" fill="none" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="120" cy="95" r="3" fill="none" stroke="#71717A" stroke-width="1.5"/>

  <!-- Center hub -->
  <circle cx="120" cy="72" r="5" fill="#64748B" filter="url(#to-glow)"/>
  <circle cx="120" cy="72" r="2.5" fill="white" opacity="0.8"/>

  <!-- Pulse ring (static) -->
  <circle cx="120" cy="72" r="10" fill="none" stroke="#64748B" stroke-width="1" opacity="0.25"/>

  <!-- Subtitle -->
  <text x="120" y="148" text-anchor="middle" fill="#64748B" font-size="9" font-family="monospace" letter-spacing="0.5">Core Operations Platform</text>
</svg>
