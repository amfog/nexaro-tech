<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160">
  <defs>
    <linearGradient id="nw-border" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <radialGradient id="nw-glow-bg" cx="50%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <filter id="nw-glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Gradient border -->
  <rect width="240" height="160" rx="12" fill="url(#nw-border)"/>
  <!-- Dark inner bg -->
  <rect x="2" y="2" width="236" height="156" rx="10" fill="#0A0E27"/>
  <!-- Radial glow -->
  <ellipse cx="120" cy="82" rx="52" ry="36" fill="url(#nw-glow-bg)"/>

  <!-- Product code -->
  <text x="120" y="22" text-anchor="middle" fill="#6B7280" font-size="9" font-family="monospace" letter-spacing="1.5">NX-000.W</text>
  <!-- Product name -->
  <text x="120" y="42" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="system-ui, sans-serif">Nexaro Website</text>

  <!-- Browser frame outer -->
  <rect x="93" y="54" width="54" height="42" rx="4" fill="rgba(168,85,247,0.08)" stroke="url(#nw-border)" stroke-width="1.5"/>
  <!-- Browser toolbar bar -->
  <rect x="93" y="54" width="54" height="10" rx="4" fill="rgba(168,85,247,0.25)"/>
  <rect x="93" y="60" width="54" height="4" fill="rgba(168,85,247,0.25)"/>
  <!-- Traffic light dots -->
  <circle cx="100" cy="59" r="2" fill="#A855F7"/>
  <circle cx="106" cy="59" r="2" fill="#EC4899"/>
  <circle cx="112" cy="59" r="2" fill="#A855F7" opacity="0.4"/>
  <!-- URL bar hint -->
  <rect x="118" y="56" width="22" height="5" rx="2" fill="rgba(255,255,255,0.07)"/>

  <!-- Code lines in browser body -->
  <line x1="99" y1="72" x2="126" y2="72" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="99" y1="78" x2="138" y2="78" stroke="#EC4899" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="99" y1="84" x2="122" y2="84" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="99" y1="90" x2="132" y2="90" stroke="#EC4899" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

  <!-- Glow point below browser -->
  <circle cx="120" cy="103" r="3.5" fill="#A855F7" filter="url(#nw-glow)"/>
  <line x1="120" y1="96" x2="120" y2="100" stroke="#A855F7" stroke-width="1" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="120" y="148" text-anchor="middle" fill="#A855F7" font-size="9" font-family="monospace" letter-spacing="0.5">Company Platform</text>
</svg>
