<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160">
  <defs>
    <linearGradient id="ro-border" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <radialGradient id="ro-glow-bg" cx="50%" cy="58%" r="35%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <filter id="ro-glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Gradient border -->
  <rect width="240" height="160" rx="12" fill="url(#ro-border)"/>
  <!-- Dark inner bg -->
  <rect x="2" y="2" width="236" height="156" rx="10" fill="#0A0E27"/>
  <!-- Radial glow -->
  <ellipse cx="120" cy="84" rx="50" ry="36" fill="url(#ro-glow-bg)"/>

  <!-- Product code -->
  <text x="120" y="22" text-anchor="middle" fill="#6B7280" font-size="9" font-family="monospace" letter-spacing="1.5">NX-004.R</text>
  <!-- Product name -->
  <text x="120" y="42" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="system-ui, sans-serif">Rent OS</text>

  <!-- Building / property icon -->
  <!-- Roof triangle -->
  <path d="M120 56 L140 70 L100 70 Z"
    fill="rgba(16,185,129,0.15)" stroke="url(#ro-border)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Building body -->
  <rect x="104" y="70" width="32" height="26" fill="rgba(16,185,129,0.1)" stroke="url(#ro-border)" stroke-width="1.5"/>
  <!-- Windows -->
  <rect x="108" y="74" width="8" height="9" rx="1" fill="#10B981" opacity="0.7"/>
  <rect x="124" y="74" width="8" height="9" rx="1" fill="#10B981" opacity="0.7"/>
  <!-- Door -->
  <rect x="117" y="83" width="6" height="13" rx="1" fill="#0D9488" opacity="0.9" filter="url(#ro-glow)"/>
  <!-- Ground line -->
  <line x1="98" y1="96" x2="142" y2="96" stroke="url(#ro-border)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Subtitle -->
  <text x="120" y="148" text-anchor="middle" fill="#10B981" font-size="8.5" font-family="monospace" letter-spacing="0.3">Property &amp; Rent Management</text>
</svg>
