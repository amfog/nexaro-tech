<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160">
  <defs>
    <linearGradient id="nc-border" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <radialGradient id="nc-glow-bg" cx="50%" cy="58%" r="35%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="nc-glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Gradient border -->
  <rect width="240" height="160" rx="12" fill="url(#nc-border)"/>
  <!-- Dark inner bg -->
  <rect x="2" y="2" width="236" height="156" rx="10" fill="#0A0E27"/>
  <!-- Radial glow -->
  <ellipse cx="120" cy="86" rx="55" ry="38" fill="url(#nc-glow-bg)"/>

  <!-- Product code -->
  <text x="120" y="22" text-anchor="middle" fill="#6B7280" font-size="9" font-family="monospace" letter-spacing="1.5">NX-003.C</text>
  <!-- Product name -->
  <text x="120" y="42" text-anchor="middle" fill="white" font-size="15" font-weight="bold" font-family="system-ui, sans-serif">Nexaro CRM</text>

  <!-- Funnel / pipeline icon -->
  <!-- Top wide layer -->
  <path d="M96 58 L144 58 L131 74 L109 74 Z"
    fill="rgba(34,211,238,0.15)" stroke="url(#nc-border)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Middle layer -->
  <path d="M109 74 L131 74 L127 88 L113 88 Z"
    fill="rgba(34,211,238,0.1)" stroke="url(#nc-border)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Stem -->
  <rect x="116" y="88" width="8" height="14" rx="2" fill="url(#nc-border)" opacity="0.8"/>
  <!-- Bottom glow dot -->
  <circle cx="120" cy="108" r="3.5" fill="#22D3EE" filter="url(#nc-glow)"/>

  <!-- Subtitle -->
  <text x="120" y="148" text-anchor="middle" fill="#22D3EE" font-size="9" font-family="monospace" letter-spacing="0.5">Smart Business CRM</text>
</svg>
